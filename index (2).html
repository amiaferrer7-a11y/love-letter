<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open Me ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#ffe6ee;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.loading{
position:absolute;
font-size:22px;
color:#ff4f7b;
text-align:center;
animation:hide 3s forwards;
}

@keyframes hide{
0%,90%{opacity:1;}
100%{opacity:0;visibility:hidden;}
}

.container{
display:none;
flex-direction:column;
align-items:center;
animation:show .5s forwards;
}

@keyframes show{
from{opacity:0;}
to{opacity:1;}
}

.envelope{
width:280px;
height:180px;
background:#ff9db5;
position:relative;
cursor:pointer;
border-radius:0 0 10px 10px;
box-shadow:0 10px 25px rgba(0,0,0,.2);
}

.flap{
position:absolute;
top:0;
left:0;
width:0;
height:0;
border-left:140px solid transparent;
border-right:140px solid transparent;
border-top:90px solid #ff6f91;
transform-origin:top;
transition:.6s;
}

.letter{
position:absolute;
left:20px;
top:20px;
width:240px;
height:280px;
background:white;
border-radius:10px;
padding:20px;
transform:translateY(120px);
opacity:0;
transition:1s;
}

.open .flap{
transform:rotateX(180deg);
}

.open .letter{
transform:translateY(-170px);
opacity:1;
}

h2{
color:#ff4f7b;
text-align:center;
margin-bottom:15px;
}

p{
line-height:1.8;
text-align:center;
color:#444;
}

.heart{
position:absolute;
font-size:25px;
animation:up 5s linear infinite;
}

@keyframes up{
from{
transform:translateY(100vh);
opacity:1;
}
to{
transform:translateY(-100px);
opacity:0;
}
}
</style>
</head>

<body>

<div class="loading" id="loading">
Loading...<br><br>
█░░░░░░░░░ 10%<br>
█████░░░░ 50%<br>
██████████ 100%<br><br>
Access Granted ❤️
</div>

<div class="container" id="container">

<h3 style="margin-bottom:15px;color:#ff4f7b;">
💌 Click to Open
</h3>

<div class="envelope" onclick="openLetter()">

<div class="flap"></div>

<div class="letter">

<h2>❤️ Hi, Baby ❤️</h2>

<p>
I love you so much.<br><br>

Please stay with me.<br><br>

You're my favorite person.<br><br>

That's all I want. ❤️
</p>

</div>

</div>

</div>

<script>

setTimeout(()=>{
document.getElementById("loading").style.display="none";
document.getElementById("container").style.display="flex";
},3000);

function openLetter(){
document.querySelector(".envelope").classList.toggle("open");
}

setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"vw";
h.style.fontSize=(20+Math.random()*25)+"px";
document.body.appendChild(h);

setTimeout(()=>{
h.remove();
},5000);

},300);

</script>

</body>
</html>
